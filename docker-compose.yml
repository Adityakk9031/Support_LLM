version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "1"
      POSTGRES_DB: support
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata: